<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="chat-app">
    <header class="chat-header">
      <div>
        <h1>AI Assistant</h1>
        <p>Ask anything about our website and services.</p>
      </div>
      <span id="statusText" class="status-badge">Ready</span>
    </header>

    <section id="chatWindow" class="chat-window" aria-live="polite" aria-label="Chat conversation">
      <article class="message assistant">
        <div class="avatar">AI</div>
        <div class="bubble">
          Hello. How can I help you today?
        </div>
      </article>
    </section>

    <form id="chatForm" class="chat-form">
      <label for="messageInput" class="sr-only">Type your message</label>
      <textarea
        id="messageInput"
        placeholder="Type your message..."
        rows="1"
        maxlength="4000"
        required
      ></textarea>
      <button id="sendButton" type="submit">Send</button>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
